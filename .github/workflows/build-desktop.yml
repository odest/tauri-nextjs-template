name: Build Desktop Apps
on:
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag"
        required: true
        type: string
      build_windows:
        required: true
        type: boolean
      build_macos:
        required: true
        type: boolean
      build_linux:
        required: true
        type: boolean

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          MATRIX_JSON="{\"include\":["

          if [ "${{ inputs.build_macos }}" == "true" ]; then
            MATRIX_JSON="$MATRIX_JSON{\"platform\":\"macos-latest\",\"rust_targets\":\"aarch64-apple-darwin\",\"args\":\"--target aarch64-apple-darwin\",\"os_name\":\"macos\"},"
            MATRIX_JSON="$MATRIX_JSON{\"platform\":\"macos-latest\",\"rust_targets\":\"x86_64-apple-darwin\",\"args\":\"--target x86_64-apple-darwin\",\"os_name\":\"macos\"},"
          fi

          if [ "${{ inputs.build_linux }}" == "true" ]; then
            MATRIX_JSON="$MATRIX_JSON{\"platform\":\"ubuntu-22.04\",\"rust_targets\":\"\",\"args\":\"\",\"os_name\":\"linux\"},"
          fi

          if [ "${{ inputs.build_windows }}" == "true" ]; then
            MATRIX_JSON="$MATRIX_JSON{\"platform\":\"windows-latest\",\"rust_targets\":\"\",\"args\":\"\",\"os_name\":\"windows\"},"
          fi

          if [ "$MATRIX_JSON" == "{\"include\":[" ]; then
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
          else
            MATRIX_JSON="${MATRIX_JSON%,}]}"
            echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT
          fi

  build-desktop:
    needs: prepare-matrix
    if: ${{ fromJson(needs.prepare-matrix.outputs.matrix).include[0] != null }}
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - name: Install OS deps (Ubuntu only)
        if: ${{ matrix.platform == 'ubuntu-22.04' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/native/src-tauri -> target"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: "~/.pnpm-store"
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Build Tauri Desktop App and create Release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag_name }}
          releaseName: ${{ inputs.tag_name }}
          releaseBody: "Desktop release for ${{ inputs.tag_name }}"
          assetNamePattern: "[name]_${{ inputs.tag_name }}_${{ matrix.os_name }}_[arch][ext]"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: "apps/native"
          includeRelease: true
          includeUpdaterJson: true
