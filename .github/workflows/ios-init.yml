name: Initialize iOS Project

on:
  workflow_dispatch:

jobs:
  init-ios:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, x86_64-apple-ios, aarch64-apple-ios-sim

      - name: Install Dependencies
        run: pnpm install

      - name: Run Tauri iOS Init in Native App
        working-directory: ./apps/native
        run: pnpm tauri ios init

      - name: Commit and Push Generated iOS Code
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
 
          git add apps/native/src-tauri/gen/apple/ 
          
          git commit -m "build(ios): initialize Tauri iOS project via GitHub Actions" || echo "No changes to commit"
          git push
