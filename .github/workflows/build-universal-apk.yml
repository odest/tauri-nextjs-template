name: Build Universal APKs
on:
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag"
        required: true
        type: string
    secrets:
      STORE_FILE:
        required: false
      STORE_PASSWORD:
        required: false
      KEY_ALIAS:
        required: false
      KEY_PASSWORD:
        required: false
      BASE64_JKS:
        required: false

jobs:
  build_universal_apk:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - name: Install deps (ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install Rust (Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "aarch64-linux-android x86_64-linux-android armv7-linux-androideabi i686-linux-android"

      - name: Install Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d

      - name: Install frontend deps
        run: pnpm install

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/native/src-tauri -> target"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: "~/.pnpm-store"
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Set environment variables for Android NDK
        run: |
          echo "NDK_HOME=${{ steps.ndk.outputs.ndk-path }}" >> $GITHUB_ENV
          echo "SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

      - name: Check Keystore Secrets
        id: check_secrets
        run: |
          if [ -n "${{ secrets.BASE64_JKS }}" ]; then
            echo "HAS_SECRETS=true" >> $GITHUB_ENV
          else
            echo "HAS_SECRETS=false" >> $GITHUB_ENV
          fi

      - name: Create keystore.properties and jks file
        if: env.HAS_SECRETS == 'true'
        env:
          storeFile: ${{ secrets.STORE_FILE }}
          storePassword: ${{ secrets.STORE_PASSWORD }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          jksBase64: ${{ secrets.BASE64_JKS }}
        run: |
          resolvedStoreFile="${storeFile/#\~/$HOME}"
          mkdir -p "$(dirname "$resolvedStoreFile")"

          echo "storeFile=$resolvedStoreFile" > ${{github.workspace}}/apps/native/src-tauri/gen/android/keystore.properties
          echo "storePassword=$storePassword" >> ${{github.workspace}}/apps/native/src-tauri/gen/android/keystore.properties
          echo "keyAlias=$keyAlias" >> ${{github.workspace}}/apps/native/src-tauri/gen/android/keystore.properties
          echo "keyPassword=$keyPassword" >> ${{github.workspace}}/apps/native/src-tauri/gen/android/keystore.properties
          echo "$jksBase64" | base64 --decode > "$resolvedStoreFile"

      - name: Build Universal Release
        if: env.HAS_SECRETS == 'true'
        run: |
          cd apps/native
          pnpm tauri android build

      - name: Build Universal Debug
        if: env.HAS_SECRETS == 'false'
        run: |
          cd apps/native
          pnpm tauri android build --debug

      - name: Get project name
        id: project_name
        run: |
          PROJECT_NAME=$(node -p "require('./package.json').name")
          echo "name=$PROJECT_NAME" >> $GITHUB_OUTPUT

      - name: Rename Artifacts
        run: |
          if [ "${{ env.HAS_SECRETS }}" == "true" ]; then
            SUFFIX=""
          else
            SUFFIX="-debug"
          fi

          APK_PATH=$(find ${{ github.workspace }}/apps/native/src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" "${{ github.workspace }}/${{ steps.project_name.outputs.name }}_${{ inputs.tag_name }}_android_universal${SUFFIX}.apk"
          fi

          if [ "${{ env.HAS_SECRETS }}" == "true" ]; then
            AAB_PATH=$(find ${{ github.workspace }}/apps/native/src-tauri/gen/android/app/build/outputs/bundle -name "*.aab" | head -n 1)
            if [ -n "$AAB_PATH" ]; then
              cp "$AAB_PATH" "${{ github.workspace }}/${{ steps.project_name.outputs.name }}_${{ inputs.tag_name }}_android_universal${SUFFIX}.aab"
            fi
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Universal-APK-${{ inputs.tag_name }}
          path: ${{ github.workspace }}/*_android_universal*.*

      - name: Upload Release to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ inputs.tag_name }} \
            ${{ github.workspace }}/*_android_universal*.* \
            --clobber \
            --repo "$GITHUB_REPOSITORY"
